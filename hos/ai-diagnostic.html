<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediQure AI Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* light gray fallback */
        }

        /* Ambient glowing background */
        .ambient-bg {
            background: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 30%),
                        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 35%);
            background-color: #0f172a; /* Slate 900 base */
        }

        /* Glass chat box styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Scrollbar aesthetics */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        #messages::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.5);
        }

        /* Message bubbles */
        .user-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); /* Emerald */
            color: #ffffff;
            border-bottom-right-radius: 4px !important;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transform-origin: right bottom;
            animation: messagePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ai-message {
            background: rgba(30, 41, 59, 0.8); /* Slate 800 */
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border-top-left-radius: 4px !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transform-origin: left top;
            animation: messagePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messagePop {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Loader animation */
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #10b981;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px #10b981; }
        }

        /* Input glow */
        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2), inset 0 0 15px rgba(16, 185, 129, 0.05);
            border-color: #10b981;
        }

        /* Typist cursor */
        .typing::after {
            content: "▋";
            animation: blink 1s step-start infinite;
            color: #10b981;
            margin-left: 2px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="h-full font-sans text-gray-800 ambient-bg overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="w-full z-10 glass-panel border-b-0 border-white/5 bg-slate-900/50 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="flex items-center justify-center w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 text-gray-300 transition-colors border border-white/10 group">
                    <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                </a>
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIdZ5QHsaZ3GRnCvn-oq8pH_CVe56woKXYPQ&s" 
                             alt="MediQure Logo" 
                             class="h-10 w-10 rounded-full border-2 border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.4)]" />
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-slate-900 rounded-full animate-pulse"></span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white tracking-tight">Dr. AI Assistant</h1>
                        <p class="text-xs text-emerald-400 font-medium">Online & ready</p>
                    </div>
                </div>
            </div>
            <div>
                <!-- Extra top right actions if any -->
            </div>
        </div>
    </header>

    <!-- Main Chat Workspace -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col justify-end min-h-0 relative">

        <!-- Initial Welcome Banner if chat is empty -->
        <div id="welcome-banner" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center w-full max-w-lg px-6 transition-opacity duration-500 z-0">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                <i class="fas fa-robot text-4xl text-emerald-400"></i>
            </div>
            <h2 class="text-3xl font-bold text-white mb-3">Hello, I'm Dr. Medi.</h2>
            <p class="text-slate-400 text-lg">Describe your symptoms or ask a medical question, and I will give you expert triage guidance.</p>
        </div>

        <!-- Chat Output -->
        <div id="messages" class="flex-1 overflow-y-auto w-full space-y-6 flex flex-col z-10 scroll-smooth pb-4 px-2">
            <!-- Dynamic Messages injected here -->
        </div>

        <!-- Input Box Area -->
        <div class="mt-4 z-10">
            <div class="relative group input-glow bg-slate-800/80 backdrop-blur-md border border-slate-700/50 rounded-2xl p-2 transition-all">
                <div class="flex items-end space-x-2">
                    <button class="flex items-center justify-center w-12 h-12 rounded-xl text-slate-400 hover:text-emerald-400 hover:bg-slate-700/50 transition-colors shrink-0">
                        <i class="fas fa-paperclip text-lg"></i>
                    </button>
                    <textarea 
                        id="inputPrompt" 
                        class="w-full bg-transparent text-white placeholder-slate-400 focus:outline-none resize-none py-3 max-h-32 min-h-[48px] overflow-y-auto leading-relaxed" 
                        placeholder="Describe your symptoms here..."
                        rows="1"
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); GetResponse(); }"
                        oninput="this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';"
                    ></textarea>
                    <button 
                        id="sendPromptBtn" 
                        onclick="GetResponse()"
                        class="flex items-center justify-center w-12 h-12 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-white transition-all transform active:scale-95 shrink-0 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                        <i class="fas fa-paper-plane text-lg translate-y-[1px] -translate-x-[1px]"></i>
                    </button>
                </div>
            </div>
            <div class="text-center mt-3">
                <p class="text-[11px] text-slate-500 uppercase tracking-wider font-semibold">
                    <i class="fas fa-shield-alt mr-1"></i> Medical Assistant AI. Always consult a real doctor for emergencies.
                </p>
            </div>
        </div>
    </main>

    <!-- JS Logic -->
    <script>
        const inputPrompt = document.getElementById('inputPrompt');
        const sendPromptBtn = document.getElementById('sendPromptBtn');
        const messages = document.getElementById('messages');
        const welcomeBanner = document.getElementById('welcome-banner');

        // Optional: Pre-populate context about the user's role
        const SYSTEM_PROMPT = "You are a professional medical assistant named Dr. Medi. Provide helpful, accurate medical information while reminding users to consult with their doctor for serious concerns. Keep your response concise.";

        // Inject a message into the DOM
        function appendMessage(role, content, isHtml = false) {
            if (welcomeBanner) welcomeBanner.style.opacity = '0';
            
            const wrapper = document.createElement("div");
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const messageDiv = document.createElement("div");
            messageDiv.className = `max-w-[85%] sm:max-w-[75%] rounded-2xl px-5 py-3.5 text-sm sm:text-base leading-relaxed ${role === 'user' ? 'user-message' : 'ai-message'}`;
            
            // Format rendering nicely
            if (!isHtml) {
                // If it's plain text from the AI, we can do simple boldding & line breaks
                const formattedContent = content
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br/>');
                messageDiv.innerHTML = formattedContent;
            } else {
                messageDiv.innerHTML = content;
            }

            // For AI messages, add the avatar icon
            if (role === 'ai') {
                const avatar = document.createElement("div");
                avatar.innerHTML = `<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIdZ5QHsaZ3GRnCvn-oq8pH_CVe56woKXYPQ&s" class="w-8 h-8 rounded-full border border-emerald-500/50 mt-1 object-cover" />`;
                avatar.className = "flex-shrink-0 mr-3";
                
                const combinedContainer = document.createElement("div");
                combinedContainer.className = "flex max-w-full";
                combinedContainer.appendChild(avatar);
                combinedContainer.appendChild(messageDiv);
                
                wrapper.appendChild(combinedContainer);
            } else {
                wrapper.appendChild(messageDiv);
            }

            messages.appendChild(wrapper);
            scrollToBottom();
            return messageDiv;
        }

        function createTypingIndicator() {
            if (welcomeBanner) welcomeBanner.style.opacity = '0';

            const wrapper = document.createElement("div");
            wrapper.className = "flex w-full justify-start";
            
            const combinedContainer = document.createElement("div");
            combinedContainer.className = "flex max-w-full";
            
            const avatar = document.createElement("div");
            avatar.innerHTML = `<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIdZ5QHsaZ3GRnCvn-oq8pH_CVe56woKXYPQ&s" class="w-8 h-8 rounded-full border border-emerald-500/50 mt-1 object-cover" />`;
            avatar.className = "flex-shrink-0 mr-3";

            const indicatorDiv = document.createElement("div");
            indicatorDiv.className = "ai-message rounded-2xl px-5 py-4 flex items-center space-x-1.5 min-w-[60px] typing-indicator";
            indicatorDiv.innerHTML = `<span></span><span></span><span></span>`;
            
            combinedContainer.appendChild(avatar);
            combinedContainer.appendChild(indicatorDiv);
            wrapper.appendChild(combinedContainer);
            
            messages.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        async function GetResponse() {
            let promptValue = inputPrompt.value.trim();
            if (!promptValue) return;

            // Lock UI
            inputPrompt.value = '';
            inputPrompt.style.height = 'auto'; // reset textarea height
            const originalBtnContent = sendPromptBtn.innerHTML;
            sendPromptBtn.innerHTML = `<i class="fas fa-spinner fa-spin text-lg"></i>`;
            sendPromptBtn.disabled = true;
            inputPrompt.disabled = true;

            // Render User Message
            appendMessage('user', promptValue);

            // Render Typing Indicator
            const loaderTracker = createTypingIndicator();

            try {
                // Now hitting our secure PHP proxy!
                const requestData = {
                    role: SYSTEM_PROMPT,
                    prompt: promptValue
                };

                const response = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const data = await response.json();

                // Remove loader
                loaderTracker.remove();

                if (data.error) {
                    throw new Error(data.error.message || data.error);
                }

                // AI Response
                const aiOutput = data.choices?.[0]?.message?.content || "I couldn't process that request at this time.";
                
                // Animate text typing
                const aiNode = appendMessage('ai', '', true);
                typeText(aiNode, aiOutput);

            } catch (error) {
                console.error('Error:', error);
                if(loaderTracker) loaderTracker.remove();
                
                const errNode = appendMessage('ai', '', true);
                errNode.innerHTML = `<span class="text-rose-400 font-medium"><i class="fas fa-exclamation-triangle mr-2"></i> Connection failed. Please check your network or try again later.</span>`;
                errNode.style.background = 'rgba(225, 29, 72, 0.1)';
                errNode.style.borderColor = 'rgba(225, 29, 72, 0.2)';
            } finally {
                // Free UI
                sendPromptBtn.innerHTML = originalBtnContent;
                sendPromptBtn.disabled = false;
                inputPrompt.disabled = false;
                inputPrompt.focus();
            }
        }

        // Typing effect for the AI content
        function typeText(element, text, i = 0) {
            // Very simple typewriter
            if (i === 0) {
                element.innerHTML = '';
                element.classList.add('typing');
            }
            if (i < text.length) {
                // handle newlines roughly by taking chunks or just using basic append
                element.innerHTML = text.substring(0, i + 1).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
                scrollToBottom();
                setTimeout(() => typeText(element, text, i + 1), 10);
            } else {
                element.classList.remove('typing');
            }
        }

        function scrollToBottom() {
            messages.scrollTo({ top: messages.scrollHeight, behavior: "smooth" });
            window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth"});
        }
    </script>
</body>
</html>
